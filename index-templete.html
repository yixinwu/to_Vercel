<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幻灯片演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .presentation-container {
            width: 1280px;
            height: 760px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .slide-content {
            flex: 1;
            position: relative;
        }

        .slide {
            display: none;
            height: 100%;
            width: 100%;
        }

        .slide.active {
            display: flex;
            flex-direction: column;
        }

        /* 封面页样式 */
        .slide.cover {
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .slide.cover h1 {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 20px;
            color: white;
        }

        .slide.cover .subtitle {
            font-size: 28px;
            color: rgba(255, 255, 255, 0.9);
        }

        /* 内容页样式 */
        .slide.content {
            flex-direction: column;
        }

        .slide-header {
            background: #f8f9fa;
            border-bottom: 2px solid #667eea;
            padding: 24px 60px;
        }

        .slide-header h2 {
            font-size: 32px;
            font-weight: 600;
            color: #1a1a2e;
            margin: 0;
        }

        .slide-body {
            flex: 1;
            padding: 40px 60px;
            overflow-y: auto;
        }

        .slide-body p {
            font-size: 20px;
            line-height: 1.8;
            color: #4a4a68;
            margin-bottom: 16px;
        }

        .slide-body ul {
            list-style: none;
            padding-left: 0;
            margin-top: 20px;
        }

        .slide-body li {
            font-size: 18px;
            color: #4a4a68;
            padding: 10px 0;
            padding-left: 28px;
            position: relative;
        }

        .slide-body li::before {
            content: '●';
            color: #667eea;
            font-weight: bold;
            position: absolute;
            left: 0;
            font-size: 12px;
            top: 14px;
        }

        /* 导航栏样式 */
        .navigation-bar {
            height: 70px;
            background: #ffffff;
            border-top: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 60px;
            z-index: 100;
        }

        .nav-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: auto;
        }

        .nav-button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .nav-button:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .nav-button.prev::before {
            content: '←';
            font-size: 18px;
        }

        .nav-button.next::after {
            content: '→';
            font-size: 18px;
        }

        .page-indicator {
            font-size: 18px;
            color: #4a5568;
            font-weight: 500;
        }

        .page-indicator .current {
            color: #667eea;
            font-weight: 700;
            font-size: 24px;
        }

        /* 全屏模式 */
        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #4a5568;
            transition: all 0.3s ease;
            z-index: 200;
        }

        .fullscreen-btn:hover {
            background: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="presentation-container">
        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全屏</button>
        
        <div class="slide-content" id="slideContainer">
            <!-- 幻灯片 1: 封面 -->
            <div class="slide cover active" data-slide="0">
                <h1>演示标题</h1>
                <p class="subtitle">副标题 / 说明文字</p>
            </div>

            <!-- 幻灯片 2: 内容页 -->
            <div class="slide content" data-slide="1">
                <div class="slide-header">
                    <h2>第一章：项目概述</h2>
                </div>
                <div class="slide-body">
                    <p>这里是项目的主要介绍内容。您可以添加文字、图片、图表等元素来丰富您的演示。</p>
                    <ul>
                        <li>要点一：核心功能介绍</li>
                        <li>要点二：技术优势说明</li>
                        <li>要点三：应用场景展示</li>
                    </ul>
                </div>
            </div>

            <!-- 幻灯片 3: 内容页 -->
            <div class="slide content" data-slide="2">
                <div class="slide-header">
                    <h2>第二章：详细内容</h2>
                </div>
                <div class="slide-body">
                    <p>在这一页中，您可以展示更详细的信息和数据。</p>
                    <p>支持多段落文本，让内容更加清晰易读。</p>
                    <p>标题栏和内容区域分离，使页面结构更加清晰。</p>
                </div>
            </div>

            <!-- 幻灯片 4: 结束页 -->
            <div class="slide cover" data-slide="3">
                <h1>谢谢观看</h1>
                <p class="subtitle">Questions & Answers</p>
            </div>
        </div>

        <div class="navigation-bar">
            <button class="nav-button prev" id="prevBtn" type="button">上一页</button>
            <div class="page-indicator">
                <span class="current" id="currentPage">1</span> / <span id="totalPages">4</span>
            </div>
            <button class="nav-button next" id="nextBtn" type="button">下一页</button>
        </div>
    </div>

    <script>
        (function() {
            let currentSlide = 0;
            const slides = document.querySelectorAll('.slide');
            const totalSlides = slides.length;
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const currentPageEl = document.getElementById('currentPage');
            const totalPagesEl = document.getElementById('totalPages');

            function showSlide(index) {
                slides.forEach((slide, i) => {
                    if (i === index) {
                        slide.classList.add('active');
                        slide.style.display = 'flex';
                    } else {
                        slide.classList.remove('active');
                        slide.style.display = 'none';
                    }
                });
                
                currentPageEl.textContent = index + 1;
                prevBtn.disabled = index === 0;
                nextBtn.disabled = index === totalSlides - 1;
            }

            function changeSlide(direction) {
                const newIndex = currentSlide + direction;
                if (newIndex >= 0 && newIndex < totalSlides) {
                    currentSlide = newIndex;
                    showSlide(currentSlide);
                }
            }

            // 绑定按钮事件
            prevBtn.addEventListener('click', function() {
                changeSlide(-1);
            });

            nextBtn.addEventListener('click', function() {
                changeSlide(1);
            });

            // 键盘导航
            document.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    changeSlide(-1);
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    changeSlide(1);
                }
            });

            // 全屏功能
            window.toggleFullscreen = function() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.log('Error attempting to enable fullscreen:', err);
                    });
                } else {
                    document.exitFullscreen();
                }
            };

            // 初始化
            totalPagesEl.textContent = totalSlides;
            showSlide(0);
        })();
    </script>
</body>
</html>
